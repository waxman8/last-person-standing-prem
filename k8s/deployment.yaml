apiVersion: apps/v1
kind: Deployment
metadata:
  name: last-person-standing-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: last-person-standing
  template:
    metadata:
      labels:
        app: last-person-standing
    spec:
      containers:
      - name: last-person-standing
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8000
        env:
        - name: FOOTBALL_DATA_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: football-api-key
        - name: DATABASE_URL
          value: "sqlite:////app/data/lms.db"
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: lms-pvc
